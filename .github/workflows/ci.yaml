name: ci
on:
  pull_request:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: pnpm install
      - name: Format
        run: just format
      - name: Lint
        run: just lint
      - name: Build
        run: just build
